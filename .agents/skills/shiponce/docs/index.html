<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShipOnce 文档</title>
    <style>
      :root {
        --bg: #ffffff;
        --text: #1a1a2e;
        --text-secondary: #4b5563;
        --muted: #6b7280;
        --border: #e5e7eb;
        --link: #2563eb;
        --code-bg: #f3f4f6;
        --sidebar-bg: #f9fafb;
        --sidebar-active-bg: #eff6ff;
        --sidebar-active-border: #3b82f6;
        --table-stripe: #f9fafb;
        --inline-code: #f3f4f6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f172a;
          --text: #e2e8f0;
          --text-secondary: #cbd5e1;
          --muted: #94a3b8;
          --border: #1e293b;
          --link: #60a5fa;
          --code-bg: #1e293b;
          --sidebar-bg: #0c1222;
          --sidebar-active-bg: #1e3a5f;
          --sidebar-active-border: #3b82f6;
          --table-stripe: #1a2332;
          --inline-code: #1e293b;
        }
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.7;
        display: flex;
        min-height: 100vh;
      }

      .menu-toggle {
        display: none;
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 30;
        background: var(--sidebar-bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 20px;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }
      .overlay {
        display: none;
      }

      nav {
        width: 280px;
        min-width: 280px;
        background: var(--sidebar-bg);
        border-right: 1px solid var(--border);
        padding: 24px 0;
        overflow-y: auto;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 20;
      }
      nav h2 {
        font-size: 16px;
        padding: 0 20px 16px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
        color: var(--text);
      }
      nav .cat {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--muted);
        padding: 16px 20px 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      nav .cat .arrow {
        font-size: 10px;
        transition: transform 0.2s;
      }
      nav .cat.collapsed .arrow {
        transform: rotate(-90deg);
      }
      nav .cat {
        cursor: pointer;
        user-select: none;
      }
      nav a {
        display: block;
        padding: 4px 20px;
        font-size: 13px;
        color: var(--muted);
        text-decoration: none;
        border-left: 3px solid transparent;
        transition: all 0.15s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      nav a:hover {
        color: var(--text);
        background: var(--sidebar-active-bg);
      }
      nav a.active {
        color: var(--link);
        border-left-color: var(--sidebar-active-border);
        background: var(--sidebar-active-bg);
        font-weight: 500;
      }
      nav a.hidden {
        display: none;
      }

      main {
        margin-left: 280px;
        flex: 1;
        max-width: 860px;
        padding: 48px 48px 96px;
        width: 100%;
        min-height: 100vh;
      }
      main h1 {
        font-size: 1.75em;
        margin-bottom: 16px;
      }
      main h2 {
        font-size: 1.35em;
        margin: 32px 0 12px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
      }
      main h3 {
        font-size: 1.15em;
        margin: 24px 0 8px;
      }
      main h4 {
        font-size: 1.05em;
        margin: 20px 0 6px;
      }
      main h5 {
        font-size: 1em;
        margin: 16px 0 6px;
      }
      main p {
        margin: 12px 0;
      }
      main ul,
      main ol {
        margin: 12px 0;
        padding-left: 24px;
      }
      main li {
        margin: 4px 0;
      }
      main a {
        color: var(--link);
      }
      main img {
        max-width: 100%;
        border-radius: 8px;
        border: 1px solid var(--border);
        margin: 16px 0;
      }
      main blockquote {
        border-left: 4px solid var(--link);
        padding: 8px 16px;
        margin: 16px 0;
        background: var(--code-bg);
        border-radius: 0 8px 8px 0;
        color: var(--text-secondary);
      }
      main blockquote p {
        margin: 4px 0;
      }
      main code {
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 0.875em;
        background: var(--inline-code);
        padding: 2px 6px;
        border-radius: 4px;
      }
      main pre {
        background: var(--code-bg);
        padding: 16px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 16px 0;
        border: 1px solid var(--border);
      }
      main pre code {
        background: none;
        padding: 0;
        font-size: 0.85em;
      }
      main table {
        width: 100%;
        border-collapse: collapse;
        margin: 16px 0;
        font-size: 0.9em;
      }
      main th,
      main td {
        border: 1px solid var(--border);
        padding: 8px 12px;
        text-align: left;
      }
      main th {
        background: var(--code-bg);
        font-weight: 600;
      }
      main tr:nth-child(even) td {
        background: var(--table-stripe);
      }

      #loading,
      #error,
      #welcome {
        text-align: center;
        padding: 80px 20px;
        color: var(--muted);
      }
      #welcome h2 {
        border: none;
        font-size: 1.5em;
        margin-bottom: 16px;
      }
      #welcome p {
        max-width: 500px;
        margin: 0 auto;
        line-height: 1.8;
      }
      .spinner {
        display: inline-block;
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--link);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 900px) {
        .menu-toggle {
          display: flex;
        }
        nav {
          transform: translateX(-100%);
          transition: transform 0.25s ease;
          box-shadow: 2px 0 12px rgba(0, 0, 0, 0.15);
        }
        nav.open {
          transform: translateX(0);
        }
        .overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 15;
        }
        .overlay.show {
          display: block;
        }
        main {
          margin-left: 0;
          padding: 56px 20px 48px;
        }
      }
      @media print {
        nav,
        .menu-toggle,
        .overlay {
          display: none;
        }
        main {
          margin-left: 0;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
      ☰
    </button>
    <div class="overlay" id="overlay"></div>

    <nav id="sidebar">
      <h2>ShipOnce 文档</h2>
      <div id="navLinks"></div>
    </nav>

    <main>
      <div id="welcome">
        <h2>ShipOnce 文档</h2>
        <p>
          共 <span id="articleCount">--</span> 篇文章，基于 shiponce TanStack
          Start 模板实践经验整理。
        </p>
        <p style="margin-top: 16px">请从左侧目录选择文章阅读。</p>
      </div>
      <div id="loading" style="display: none"><div class="spinner"></div></div>
      <div id="error" style="display: none"></div>
      <div id="article" style="display: none"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      (function () {
        const sidebar = document.getElementById('sidebar');
        const navLinks = document.getElementById('navLinks');
        const menuToggle = document.getElementById('menuToggle');
        const overlay = document.getElementById('overlay');
        const welcome = document.getElementById('welcome');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const article = document.getElementById('article');
        const articleCount = document.getElementById('articleCount');

        let manifest = null;
        let activeSlug = null;

        marked.setOptions({ gfm: true, breaks: false });

        function openSidebar() {
          sidebar.classList.add('open');
          overlay.classList.add('show');
        }
        function closeSidebar() {
          sidebar.classList.remove('open');
          overlay.classList.remove('show');
        }
        menuToggle.addEventListener('click', () =>
          sidebar.classList.contains('open') ? closeSidebar() : openSidebar()
        );
        overlay.addEventListener('click', closeSidebar);

        function buildSidebar(manifest) {
          let html = '';
          const pagesByCat = {};
          for (const p of manifest.pages) {
            if (!pagesByCat[p.category]) pagesByCat[p.category] = [];
            pagesByCat[p.category].push(p);
          }

          let catHasPages = false;
          for (const cat of manifest.categories) {
            const pages = pagesByCat[cat] || [];
            if (pages.length === 0) continue;
            catHasPages = true;
            html +=
              '<div class="cat" data-cat="' +
              escapeHtml(cat) +
              '">▾ ' +
              escapeHtml(cat) +
              '</div>';
            for (const page of pages) {
              html +=
                '<a href="#' +
                page.slug +
                '" data-slug="' +
                page.slug +
                '" data-cat="' +
                escapeHtml(cat) +
                '">' +
                escapeHtml(page.title) +
                '</a>';
            }
          }

          navLinks.innerHTML = html;

          navLinks.querySelectorAll('.cat').forEach((el) => {
            el.addEventListener('click', () => {
              el.classList.toggle('collapsed');
              const cat = el.dataset.cat;
              navLinks
                .querySelectorAll('a[data-cat="' + cat + '"]')
                .forEach((a) => a.classList.toggle('hidden'));
            });
          });

          navLinks.addEventListener('click', (e) => {
            const a = e.target.closest('a[data-slug]');
            if (!a) return;
            e.preventDefault();
            const slug = a.dataset.slug;
            window.location.hash = slug;
            loadDoc(slug);
            closeSidebar();
          });
        }

        async function loadDoc(slug) {
          if (activeSlug === slug) return;
          welcome.style.display = 'none';
          article.style.display = 'none';
          error.style.display = 'none';
          loading.style.display = 'block';

          if (activeSlug) {
            const prev = navLinks.querySelector(
              'a[data-slug="' + activeSlug + '"]'
            );
            if (prev) prev.classList.remove('active');
          }
          const next = navLinks.querySelector('a[data-slug="' + slug + '"]');
          if (next) next.classList.add('active');
          activeSlug = slug;

          try {
            const resp = await fetch(slug + '.md');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            let md = await resp.text();
            md = md.replace(/^---[\s\S]*?---\n*/, '');

            const html = marked.parse(md);
            loading.style.display = 'none';
            article.innerHTML = html;
            article.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
          } catch (err) {
            loading.style.display = 'none';
            error.innerHTML =
              '<p>加载文章失败：' +
              escapeHtml(err.message) +
              '</p><p><a href="#' +
              slug +
              '">点击重试</a></p>';
            error.style.display = 'block';
          }
        }

        function handleHash() {
          const hash = window.location.hash.slice(1);
          if (!hash) {
            if (activeSlug) {
              const prev = navLinks.querySelector(
                'a[data-slug="' + activeSlug + '"]'
              );
              if (prev) prev.classList.remove('active');
              activeSlug = null;
            }
            welcome.style.display = 'block';
            article.style.display = 'none';
            error.style.display = 'none';
            loading.style.display = 'none';
            return;
          }
          const pages = manifest ? manifest.pages : [];
          const found = pages.find((i) => i.slug === hash);
          if (!found) {
            loading.style.display = 'none';
            welcome.style.display = 'none';
            article.style.display = 'none';
            error.innerHTML = '<p>未找到文章：' + escapeHtml(hash) + '</p>';
            error.style.display = 'block';
            return;
          }
          loadDoc(hash);
        }

        window.addEventListener('hashchange', handleHash);

        function escapeHtml(str) {
          const d = document.createElement('div');
          d.appendChild(document.createTextNode(str));
          return d.innerHTML;
        }

        fetch('manifest.json')
          .then((r) => r.json())
          .then((data) => {
            manifest = data;
            articleCount.textContent = data.pages.length;
            buildSidebar(data);
            handleHash();
          })
          .catch((err) => {
            console.error('Failed to load manifest:', err);
            error.innerHTML = '<p>无法加载文档目录，请刷新页面重试。</p>';
            error.style.display = 'block';
            welcome.style.display = 'none';
          });
      })();
    </script>
  </body>
</html>
